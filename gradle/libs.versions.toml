[versions]
kotlin = "2.3.21"
ktor = "3.4.3"
netty = "4.2.14.Final"

[libraries]
ktor-bom = { module = "io.ktor:ktor-bom", version.ref = "ktor" }
ktor-client-core = { module = "io.ktor:ktor-client-core" }
ktor-client-java = { module = "io.ktor:ktor-client-java" }
ktor-client-content-negotiation = { module = "io.ktor:ktor-client-content-negotiation" }
ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json" }

netty-bom = { module = "io.netty:netty-bom", version.ref = "netty" }
netty-transport = { module = "io.netty:netty-transport" }
netty-codec = { module = "io.netty:netty-codec" }
netty-handler  = { module = "io.netty:netty-handler" }

[bundles]

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
